<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صائد الخصومات السعودية</title>
<style>
  :root{
    --ink:#1e293b; --muted:#64748b; --line:rgba(255,255,255,.6);
    --accent:#0ea5e9; --accent-d:#0284c7; --gold:#f59e0b; --red:#ef4444;
    --glass:rgba(255,255,255,.55); --glass-strong:rgba(255,255,255,.72);
    --shadow:0 8px 32px rgba(31,41,55,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Tajawal','Segoe UI',Tahoma,system-ui,sans-serif;
    color:var(--ink); min-height:100vh; position:relative; overflow-x:hidden;
    background:linear-gradient(135deg,#eef2f7 0%,#e6ecf5 40%,#f1f5f9 100%);
  }
  body::before,body::after{
    content:""; position:fixed; border-radius:50%; filter:blur(80px); z-index:0; opacity:.5;
  }
  body::before{ width:420px;height:420px; background:#7dd3fc; top:-120px; right:-100px; }
  body::after{ width:380px;height:380px; background:#fcd34d; bottom:-120px; left:-80px; }
  img{max-width:100%; max-height:100%; object-fit:contain}
  a{text-decoration:none; color:inherit}
  button{font-family:inherit; cursor:pointer; border:none; background:none}
  main,header,footer{position:relative; z-index:1}

  .glass{
    background:var(--glass);
    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);
    border:1px solid var(--line);
    box-shadow:var(--shadow);
  }

  header{position:sticky; top:0; z-index:40; padding:10px 16px 0}
  .hwrap{
    max-width:1100px; margin:0 auto; padding:14px 18px; border-radius:22px;
    display:flex; flex-direction:column; gap:12px;
    background:var(--glass-strong);
    backdrop-filter:blur(20px) saturate(180%);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    border:1px solid var(--line); box-shadow:var(--shadow);
  }
  .hrow{display:flex; align-items:center; justify-content:space-between; gap:16px}
  .brand{display:flex; align-items:center; gap:10px}
  .logo{
    width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;
    font-size:22px; color:#fff;
    background:linear-gradient(135deg,var(--accent),var(--accent-d));
    box-shadow:0 6px 16px rgba(14,165,233,.35);
  }
  .brand h1{font-size:18px; font-weight:900; letter-spacing:-.3px}
  .live{color:var(--accent-d); font-size:11px; margin-top:3px; display:flex; align-items:center; gap:6px}
  .dot{position:relative; width:8px; height:8px}
  .dot::before,.dot::after{content:''; position:absolute; inset:0; border-radius:50%; background:#22c55e}
  .dot::before{animation:ping 1.5s cubic-bezier(0,0,.2,1) infinite}
  @keyframes ping{75%,100%{transform:scale(2.4); opacity:0}}
  .search{position:relative; width:100%}
  .search input{
    width:100%; border-radius:14px; padding:10px 40px 10px 14px; font-size:14px;
    background:rgba(255,255,255,.6); border:1px solid var(--line); color:var(--ink); outline:none;
    transition:.2s;
  }
  .search input::placeholder{color:#94a3b8}
  .search input:focus{background:#fff; box-shadow:0 0 0 3px rgba(14,165,233,.25)}
  .search .icon{position:absolute; top:50%; right:13px; transform:translateY(-50%); opacity:.5; font-size:15px}
  .desk-search{max-width:320px; display:none}
  @media(min-width:640px){ .desk-search{display:block} .mob-search{display:none} }
  nav{display:flex; gap:8px; overflow-x:auto; padding-bottom:2px}
  nav button{
    white-space:nowrap; border-radius:999px; padding:7px 18px; font-size:13px; font-weight:700;
    background:rgba(255,255,255,.5); border:1px solid var(--line); color:var(--muted); transition:.2s;
  }
  nav button:hover{background:rgba(255,255,255,.8)}
  nav button.active{
    background:linear-gradient(135deg,var(--accent),var(--accent-d)); color:#fff; border-color:transparent;
    box-shadow:0 4px 12px rgba(14,165,233,.35);
  }

  main{max-width:1100px; margin:0 auto; padding:0 16px 64px}

  .hero{
    position:relative; margin-top:20px; border-radius:26px; overflow:hidden; min-height:230px;
    background:linear-gradient(135deg,rgba(14,165,233,.16),rgba(245,158,11,.14));
    backdrop-filter:blur(16px) saturate(160%); -webkit-backdrop-filter:blur(16px) saturate(160%);
    border:1px solid var(--line); box-shadow:var(--shadow);
  }
  .slide{display:none; align-items:center; gap:24px; padding:30px}
  .slide.on{display:flex; animation:fade .6s}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .slide .txt{flex:1; min-width:0}
  .badge-hot{
    display:inline-flex; align-items:center; gap:5px; color:#fff; font-size:12.5px; font-weight:900;
    border-radius:999px; padding:6px 14px;
    background:linear-gradient(135deg,#fb7185,var(--red)); box-shadow:0 4px 12px rgba(239,68,68,.35);
  }
  .slide h2{margin-top:12px; font-size:clamp(19px,3.4vw,28px); font-weight:900; line-height:1.45; color:var(--ink);
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .slide .price{margin-top:10px; font-size:14px; display:flex; flex-wrap:wrap; gap:10px; align-items:center}
  .strike{text-decoration:line-through; color:#94a3b8}
  .reveal{color:var(--accent-d); font-weight:800}
  .slide .pic{
    width:160px;height:160px;flex-shrink:0;border-radius:20px;padding:12px;display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.7); border:1px solid var(--line);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  @media(max-width:560px){ .slide{padding:20px;gap:14px} .slide .pic{width:104px;height:104px} }
  .arrow{
    position:absolute; top:50%; transform:translateY(-50%); width:38px;height:38px;border-radius:50%;
    font-size:18px; color:var(--ink); display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.6); border:1px solid var(--line);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); transition:.2s;
  }
  .arrow:hover{background:#fff}
  .arrow.next{left:12px} .arrow.prev{right:12px}
  .dots{position:absolute; bottom:14px; right:0; left:0; display:flex; justify-content:center; gap:8px}
  .dots button{height:6px;width:8px;border-radius:999px;background:rgba(30,41,59,.25);transition:.25s}
  .dots button.on{width:24px; background:var(--accent)}

  .gh{margin:30px 0 14px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px}
  .gh h2{font-size:19px; font-weight:900; color:var(--ink)}
  .stamp{font-size:11.5px; color:var(--muted)}
  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:16px}
  @media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(min-width:960px){.grid{grid-template-columns:repeat(4,1fr)}}
  .card{
    display:block; border-radius:20px; overflow:hidden; transition:transform .25s, box-shadow .25s;
    background:var(--glass-strong);
    backdrop-filter:blur(14px) saturate(160%);
